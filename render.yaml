services:
  - type: web
    name: xai-finance-frontend
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_BASE
        fromService:
          type: pserv
          name: xai-finance-backend
          property: hostport

  - type: pserv
    name: xai-finance-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend_services.api:app --host 0.0.0.0 --port $PORT --app-dir .
    healthCheckPath: /health
    disk:
      name: xai-finance-db
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /var/data/xai_finance.db
      - key: ALIBI_SERVICE_URL
        fromService:
          type: pserv
          name: xai-finance-alibi
          property: hostport

  - type: pserv
    name: xai-finance-alibi
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements-alibi.txt
    startCommand: uvicorn alibi_service.api:app --host 0.0.0.0 --port $PORT --app-dir .
    healthCheckPath: /health
